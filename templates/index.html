<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pallet Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0b0d12; --surface: #12151e; --panel: #181c28;
    --border:  #252a3a; --border2: #1e2330;
    --amber:   #f5c842; --amber2: #e0a800; --blue: #4a9eff;
    --green:   #3de8a0; --red: #ff5f6d;
    --text:    #e2e8f0; --muted: #5a6480; --dim: #2e3448;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 14px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .logo-mark { width: 34px; height: 34px; background: var(--amber); display: grid; grid-template-columns: 1fr 1fr; gap: 3px; padding: 5px; border-radius: 4px; }
  .logo-mark span { background: var(--bg); border-radius: 1px; display: block; }
  header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
  header small { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); margin-left: auto; }
  main { display: grid; grid-template-columns: 300px 1fr; flex: 1; min-height: 0; }
  aside { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .section-label { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; padding: 18px 20px 8px; }
  .param-group { padding: 0 20px 16px; display: flex; flex-direction: column; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: .72rem; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: .04em; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'DM Mono', monospace; font-size: .9rem; padding: 7px 10px; outline: none; transition: border-color .15s; }
  input[type="number"]:focus { border-color: var(--amber); }
  .divider { height: 1px; background: var(--border2); margin: 4px 20px; }
  .grip-slider-wrap { padding: 0 20px 16px; display: flex; flex-direction: column; gap: 8px; }
  .grip-header { display: flex; justify-content: space-between; align-items: baseline; }
  .grip-header-label { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--muted); }
  .grip-readout { font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--amber); }
  .grip-mm { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); text-align: right; }
  .slider-track { position: relative; height: 24px; display: flex; align-items: center; }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: var(--dim); border-radius: 4px; outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; background: linear-gradient(to right, var(--amber) 0%, var(--amber) var(--fill, 0%), var(--dim) var(--fill, 0%), var(--dim) 100%); }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--amber); border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--amber2); cursor: pointer; }
  input[type="range"]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 3px rgba(245,200,66,.25); }
  .slider-ticks { display: flex; justify-content: space-between; padding: 0 2px; }
  .slider-ticks span { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); }
  .solve-btn { margin: 10px 20px 6px; padding: 12px; background: var(--amber); color: var(--bg); border: none; border-radius: 6px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: .9rem; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: background .15s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .solve-btn:hover { background: var(--amber2); }
  .solve-btn:active { transform: scale(.98); }
  .solve-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .schedule-btn { display: none; margin: 4px 20px 16px; padding: 11px; background: transparent; color: var(--amber); border: 1px solid var(--amber); border-radius: 6px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: .85rem; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; text-decoration: none; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
  .schedule-btn:hover { background: rgba(245,200,66,.1); }
  .stats { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .stat-item { display: flex; justify-content: space-between; align-items: center; }
  .stat-item span:first-child { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); }
  .stat-item span:last-child  { font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--amber); }
  .legend { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
  .legend-grid { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: background .12s; }
  .legend-item:hover { background: var(--border2); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-text { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--text); }
  .viewport { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .toolbar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .toolbar-label { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); letter-spacing: .08em; }
  .zoom-btn { width: 26px; height: 26px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
  .zoom-btn:hover { border-color: var(--amber); color: var(--amber); }
  .zoom-level { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); min-width: 36px; text-align: center; }
  .fit-btn { margin-left: auto; padding: 4px 12px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: .68rem; cursor: pointer; transition: border-color .15s, color .15s; }
  .fit-btn:hover { border-color: var(--blue); color: var(--blue); }
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
  .canvas-wrap:active { cursor: grabbing; }
  canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }
  .empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); pointer-events: none; }
  .empty-state svg { opacity: .2; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: .8rem; opacity: .5; }
  #tooltip { position: fixed; display: none; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--text); pointer-events: none; z-index: 100; line-height: 1.6; }
  #error-box { display: none; margin: 8px 20px; padding: 10px 14px; background: rgba(255,95,109,.08); border: 1px solid rgba(255,95,109,.3); border-radius: 6px; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--red); line-height: 1.5; }
  footer { display: flex; align-items: center; gap: 12px; padding: 8px 20px; border-top: 1px solid var(--border); background: var(--surface); font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); flex-shrink: 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }
  .status-dot.busy { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #status-msg { flex: 1; }
  .spinner { display: none; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin .7s linear infinite; margin-left: auto; }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
  <h1>Pallet Solver</h1>
  <small>MiniZinc / Gecode</small>
</header>

<main>
  <aside>
    <div class="section-label">Pack Dimensions</div>
    <div class="param-group">
      <div class="field-row">
        <div class="field"><label>Width (x) mm</label><input type="number" id="pack_x" value="70" min="1"></div>
        <div class="field"><label>Depth (y) mm</label><input type="number" id="pack_y" value="70" min="1"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-label">Pallet Dimensions</div>
    <div class="param-group">
      <div class="field-row">
        <div class="field"><label>Width (x) mm</label><input type="number" id="pallet_x" value="800" min="1"></div>
        <div class="field"><label>Depth (y) mm</label><input type="number" id="pallet_y" value="1200" min="1"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-label">Gripper</div>
    <div class="grip-slider-wrap">
      <div class="grip-header">
        <span class="grip-header-label">Grip size multiplier</span>
        <span class="grip-readout" id="grip-readout">3x</span>
      </div>
      <div class="slider-track">
        <input type="range" id="grip_mult" min="1" max="3" step="0.01" value="3">
      </div>
      <div class="slider-ticks"><span>1x</span><span>1.5x</span><span>2x</span><span>2.5x</span><span>3x</span></div>
      <div class="grip-mm" id="grip-mm">= 210 mm</div>
    </div>
    <div id="error-box"></div>
    <button class="solve-btn" id="solve-btn" onclick="runSolve()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Plan
    </button>
    <a class="schedule-btn" id="schedule-btn" href="/schedule">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      View Schedule
    </a>
    <div class="divider"></div>
    <div class="section-label">Results</div>
    <div class="stats" id="stats" style="display:none">
      <div class="stat-item"><span>n_packs</span><span id="s-npacks">-</span></div>
      <div class="stat-item"><span>n_groups</span><span id="s-ngroups">-</span></div>
      <div class="stat-item"><span>per_group</span><span id="s-pergroup">-</span></div>
      <div class="stat-item"><span>rotated</span><span id="s-rotated">-</span></div>
      <div class="stat-item"><span>pallet used</span><span id="s-used">-</span></div>
    </div>
    <div class="legend" id="legend-wrap" style="display:none">
      <div class="section-label" style="padding:0 0 8px">Groups <span id="legend-count" style="color:var(--amber)"></span></div>
      <div class="legend-grid" id="legend-grid"></div>
    </div>
  </aside>

  <div class="viewport">
    <div class="toolbar">
      <span class="toolbar-label">PALLET VIEW</span>
      <button class="zoom-btn" onclick="zoom(-0.15)">-</button>
      <span class="zoom-level" id="zoom-label">-</span>
      <button class="zoom-btn" onclick="zoom(+0.15)">+</button>
      <button class="fit-btn" onclick="fitView()">Fit</button>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="pallet-canvas"></canvas>
      <div class="empty-state" id="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="2" y="3" width="20" height="18" rx="2"/>
          <line x1="2" y1="9" x2="22" y2="9"/><line x1="2" y1="15" x2="22" y2="15"/>
          <line x1="8" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/>
        </svg>
        <p>Configure parameters and hit Plan</p>
      </div>
    </div>
  </div>
</main>

<div id="tooltip"></div>
<footer>
  <div class="status-dot" id="status-dot"></div>
  <span id="status-msg">Ready</span>
  <div class="spinner" id="spinner"></div>
</footer>

<script>
let state = null, scale = 1, panX = 0, panY = 0, hoveredGroup = null;
const PALETTE = ['#4a9eff','#f5c842','#3de8a0','#ff7c5c','#c084fc','#38bdf8','#fb923c','#a3e635','#f472b6','#34d399','#fbbf24','#60a5fa','#f87171','#a78bfa','#2dd4bf','#facc15','#4ade80','#fb7185','#818cf8','#e879f9'];
function groupColor(i) { return PALETTE[i % PALETTE.length]; }

const gripSlider = document.getElementById('grip_mult');
function updateGripDisplay() {
  const mult = parseFloat(gripSlider.value);
  const px   = parseInt(document.getElementById('pack_x').value) || 0;
  document.getElementById('grip-readout').textContent = mult.toFixed(1).replace(/\.0$/,'') + 'x';
  document.getElementById('grip-mm').textContent = '= ' + Math.round(mult * px) + ' mm';
  gripSlider.style.setProperty('--fill', ((mult-1)/2*100) + '%');
}
gripSlider.addEventListener('input', updateGripDisplay);
document.getElementById('pack_x').addEventListener('input', updateGripDisplay);
updateGripDisplay();

async function runSolve() {
  setStatus('busy','Solving...');
  document.getElementById('solve-btn').disabled = true;
  document.getElementById('spinner').classList.add('active');
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('schedule-btn').style.display = 'none';
  const pack_x = parseInt(document.getElementById('pack_x').value);
  const mult   = parseFloat(gripSlider.value);
  try {
    const res  = await fetch('/solve', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ pack_x, pack_y: parseInt(document.getElementById('pack_y').value), pallet_x: parseInt(document.getElementById('pallet_x').value), pallet_y: parseInt(document.getElementById('pallet_y').value), grip_size: Math.round(mult*pack_x) }) });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    state = data;
    sessionStorage.setItem('pallet_solver_result', JSON.stringify(data));
    document.getElementById('empty-state').style.display = 'none';
    renderStats(data); renderLegend(data); fitView();
    document.getElementById('schedule-btn').style.display = 'flex';
    setStatus('ok', 'Done - ' + data.n_groups + ' groups, ' + data.pallet_info.n_packs + ' packs');
  } catch(e) {
    const box = document.getElementById('error-box');
    box.style.display='block'; box.textContent='! '+e.message;
    setStatus('err','Solver error');
  } finally {
    document.getElementById('solve-btn').disabled = false;
    document.getElementById('spinner').classList.remove('active');
  }
}

function renderStats(d) {
  const pi = d.pallet_info;
  document.getElementById('s-npacks').textContent  = pi.n_packs;
  document.getElementById('s-ngroups').textContent = d.n_groups;
  const sizes = d.groups.map(g=>g.length), mn=Math.min(...sizes), mx=Math.max(...sizes);
  document.getElementById('s-pergroup').textContent = mn===mx ? mn : mn+'-'+mx;
  document.getElementById('s-rotated').textContent  = pi.rotated ? 'yes' : 'no';
  document.getElementById('s-used').textContent     = pi.pallet_x_size+'x'+pi.pallet_y_size;
  document.getElementById('stats').style.display    = 'flex';
}

function renderLegend(d) {
  const grid = document.getElementById('legend-grid');
  grid.innerHTML = '';
  document.getElementById('legend-count').textContent = '('+d.n_groups+')';
  d.groups.forEach((group,i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<div class="legend-swatch" style="background:'+groupColor(i)+'"></div><span class="legend-text">G'+(i+1)+' - ['+group.join(', ')+']</span>';
    item.addEventListener('mouseenter', ()=>{ hoveredGroup=i; drawPallet(); });
    item.addEventListener('mouseleave', ()=>{ hoveredGroup=null; drawPallet(); });
    grid.appendChild(item);
  });
  document.getElementById('legend-wrap').style.display='block';
}

const canvas = document.getElementById('pallet-canvas');
const ctx    = canvas.getContext('2d');

function fitView() {
  if (!state) return;
  const wrap=document.getElementById('canvas-wrap'), W=wrap.clientWidth, H=wrap.clientHeight, pi=state.pallet_info, pad=60;
  scale = Math.min((W-pad*2)/pi.pallet_x_size,(H-pad*2)/pi.pallet_y_size);
  panX  = (W-pi.pallet_x_size*scale)/2; panY=(H-pi.pallet_y_size*scale)/2;
  drawPallet();
}

function zoom(delta) {
  if (!state) return;
  const wrap=document.getElementById('canvas-wrap'), cx=wrap.clientWidth/2, cy=wrap.clientHeight/2, old=scale;
  scale=Math.max(0.05,Math.min(20,scale+delta*scale));
  panX=cx-(cx-panX)*(scale/old); panY=cy-(cy-panY)*(scale/old); drawPallet();
}

function resizeCanvas() {
  const wrap=document.getElementById('canvas-wrap');
  canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight;
  if (state) drawPallet();
}

function drawPallet() {
  if (!state) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const d=state, pi=d.pallet_info, pw=pi.pallet_x_size*scale, ph=pi.pallet_y_size*scale;
  ctx.fillStyle='#1a1f2e'; ctx.fillRect(panX,panY,pw,ph);
  ctx.strokeStyle='#3a4060'; ctx.lineWidth=2; ctx.strokeRect(panX,panY,pw,ph);
  const cols=pi.packs_along_x, rows=pi.packs_along_y, ew=pw/cols, eh=ph/rows, gap=Math.min(2,ew*.04);
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const n=r*cols+c+1, g=d.pack_group[n], color=groupColor(g);
      const x=panX+c*ew+gap, y=panY+r*eh+gap, w=ew-gap*2, h=eh-gap*2;
      const isHov=hoveredGroup===g, isDim=hoveredGroup!==null&&!isHov;
      ctx.globalAlpha=isDim?.18:isHov?1:.75; ctx.fillStyle=color; ctx.fillRect(x,y,w,h);
      ctx.globalAlpha=isDim?.1:isHov?1:.5; ctx.strokeStyle=color; ctx.lineWidth=isHov?2:.8; ctx.strokeRect(x,y,w,h);
      ctx.globalAlpha=1;
      if (ew>22&&eh>14) { ctx.fillStyle=isDim?'rgba(255,255,255,.15)':'rgba(0,0,0,.6)'; ctx.font=Math.min(11,ew*.35)+'px DM Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(n,x+w/2,y+h/2); }
    }
  }
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
}

let dragging=false, lastMX=0, lastMY=0;
const wrap=document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown',e=>{dragging=true;lastMX=e.clientX;lastMY=e.clientY;});
wrap.addEventListener('mousemove',e=>{
  if(dragging){panX+=e.clientX-lastMX;panY+=e.clientY-lastMY;lastMX=e.clientX;lastMY=e.clientY;drawPallet();}
  showTooltip(e);
});
wrap.addEventListener('mouseup',()=>dragging=false);
wrap.addEventListener('mouseleave',()=>{dragging=false;hideTooltip();});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,old=scale,d=e.deltaY<0?1.12:.88;
  scale=Math.max(.05,Math.min(20,scale*d)); panX=mx-(mx-panX)*(scale/old); panY=my-(my-panY)*(scale/old); drawPallet();
},{passive:false});

const tooltip=document.getElementById('tooltip');
function showTooltip(e) {
  if (!state) return hideTooltip();
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,pi=state.pallet_info;
  const ew=pi.pallet_x_size*scale/pi.packs_along_x, eh=pi.pallet_y_size*scale/pi.packs_along_y;
  const c=Math.floor((mx-panX)/ew), r=Math.floor((my-panY)/eh);
  if (c<0||c>=pi.packs_along_x||r<0||r>=pi.packs_along_y) return hideTooltip();
  const n=r*pi.packs_along_x+c+1, g=state.pack_group[n];
  if (g===undefined) return hideTooltip();
  tooltip.style.display='block'; tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-10)+'px';
  tooltip.innerHTML='<span style="color:'+groupColor(g)+'">*</span> Group '+(g+1)+'<br>Pack #'+n+'<br><span style="color:var(--muted)">col '+(c+1)+', row '+(r+1)+'</span><br><span style="color:var(--muted)">'+state.groups[g].length+' packs</span>';
}
function hideTooltip() { tooltip.style.display='none'; }

function setStatus(type,msg) { document.getElementById('status-dot').className='status-dot '+type; document.getElementById('status-msg').textContent=msg; }

new ResizeObserver(resizeCanvas).observe(wrap);
resizeCanvas();
document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') runSolve(); });
</script>
</body>
</html>
